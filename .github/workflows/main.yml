name: Build Workflow

on: [workflow_dispatch]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout Repo
                uses: actions/checkout@v3
            -   name: Setup node
                uses: actions/setup-node@v2
                with:
                    node-version: '25'
            -   name: Run CI
                run: npm ci
            -   name: Run Tests
                run: npm test
            -   name: Build project
                run: npm build --if-present